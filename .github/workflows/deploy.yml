name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'backend/**'
  workflow_dispatch:

env:
  JAR_NAME: app.jar

jobs:
  build-backend:
    name: Build Backend Jar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            backend/**/*.gradle*
            backend/gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build boot jar
        run: ./gradlew clean :app:bootJar

      - name: Rename jar to app.jar
        shell: bash
        run: |
          JAR_PATH="$(find app/build/libs -maxdepth 1 -type f -name '*.jar' | head -n 1)"
          if [ -z "$JAR_PATH" ]; then
            echo "No jar file found in backend/app/build/libs"
            exit 1
          fi
          mkdir -p build/libs
          cp "$JAR_PATH" "build/libs/${JAR_NAME}"

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          port: ${{ secrets.EC2_PORT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/build/libs/app.jar
          target: /home/ec2-user/app

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend/build/libs/app.jar
          if-no-files-found: error
