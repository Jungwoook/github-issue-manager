name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - '.github/workflows/ci.yml'
      - 'backend/**'
      - 'frontend/**'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'backend/**'
      - 'frontend/**'

jobs:
  detect-projects:
    name: Detect Projects
    runs-on: ubuntu-latest
    outputs:
      has_backend: ${{ steps.detect.outputs.has_backend }}
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend and frontend directories
        id: detect
        shell: bash
        run: |
          if [ -f backend/build.gradle ] || [ -f backend/build.gradle.kts ]; then
            echo "has_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f frontend/package.json ] && [ -f frontend/package-lock.json ] && [ -f frontend/index.html ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    name: Backend Test
    needs: detect-projects
    if: ${{ needs.detect-projects.outputs.has_backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            backend/**/*.gradle*
            backend/gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew test

  frontend:
    name: Frontend Build
    needs: detect-projects
    if: ${{ needs.detect-projects.outputs.has_frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
