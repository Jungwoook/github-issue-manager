openapi: 3.0.3
info:
  title: GitHub Issue Manager Rate Limit Recovery API
  version: 0.1.0
  description: |
    Rate limit 상태 조회, 동기화 실행 이력 조회, 실패 재처리, 수동 재동기화를 위한 API 초안이다.
    1차 구현 대상은 GitHub이며 GitLab 매핑은 TODO로 남긴다.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Rate Limit
    description: 플랫폼 API 호출 제한 상태 조회
  - name: Sync Runs
    description: 동기화 실행 이력 조회
  - name: Sync Failures
    description: 동기화 실패 조회와 재처리
  - name: Manual Resync
    description: 저장소/이슈 단위 수동 재동기화
paths:
  /api/platforms/{platform}/rate-limit:
    get:
      tags:
        - Rate Limit
      summary: 현재 플랫폼 rate limit 상태 조회
      description: 현재 플랫폼 연결 기준으로 가장 최근에 수집된 rate limit snapshot을 조회한다.
      parameters:
        - $ref: "#/components/parameters/Platform"
      responses:
        "200":
          description: 최근 rate limit snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitSnapshot"
        "204":
          description: 아직 수집된 rate limit snapshot이 없음
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/sync-runs:
    get:
      tags:
        - Sync Runs
      summary: 동기화 실행 이력 조회
      description: 최근 동기화 실행 이력을 조회한다. 필터 파라미터는 설계 초안이며 구현 시 확정한다.
      parameters:
        - name: platform
          in: query
          required: false
          schema:
            type: string
            example: github
        - name: resourceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyncResourceType"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyncRunStatus"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: 동기화 실행 이력 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncRun"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/sync-runs/{syncRunId}:
    get:
      tags:
        - Sync Runs
      summary: 동기화 실행 상세 조회
      description: 단일 동기화 실행의 상세 결과와 처리 건수를 조회한다.
      parameters:
        - $ref: "#/components/parameters/SyncRunId"
      responses:
        "200":
          description: 동기화 실행 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRun"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/sync-failures:
    get:
      tags:
        - Sync Failures
      summary: 재처리 대상 실패 목록 조회
      description: 해결되지 않은 동기화 실패 목록과 재처리 가능 여부를 조회한다.
      parameters:
        - name: platform
          in: query
          required: false
          schema:
            type: string
            example: github
        - name: retryable
          in: query
          required: false
          schema:
            type: boolean
        - name: resolved
          in: query
          required: false
          schema:
            type: boolean
        - name: resourceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyncResourceType"
      responses:
        "200":
          description: 실패 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncFailure"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/sync-failures/{failureId}/retry:
    post:
      tags:
        - Sync Failures
      summary: 단일 실패 재처리
      description: 재처리 가능한 실패를 선택해 다시 실행한다. 실행 결과는 새 SyncRun으로 기록한다.
      parameters:
        - $ref: "#/components/parameters/FailureId"
      responses:
        "200":
          description: 재처리 실행 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRun"
        "400":
          description: 재처리 불가 또는 재처리 가능 시각 이전
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncFailureError"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/platforms/{platform}/repositories/{repositoryId}/resync:
    post:
      tags:
        - Manual Resync
      summary: 저장소 단위 수동 재동기화
      description: 특정 저장소 범위의 cache를 원격 상태와 다시 맞춘다.
      parameters:
        - $ref: "#/components/parameters/Platform"
        - $ref: "#/components/parameters/RepositoryId"
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum:
              - REPOSITORY
              - ISSUES
              - COMMENTS
              - ALL
            default: ALL
      responses:
        "200":
          description: 수동 재동기화 실행 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRun"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/platforms/{platform}/repositories/{repositoryId}/issues/{issueNumberOrKey}/resync:
    post:
      tags:
        - Manual Resync
      summary: 이슈 단위 수동 재동기화
      description: 특정 이슈와 필요 시 댓글 cache를 원격 상태와 다시 맞춘다.
      parameters:
        - $ref: "#/components/parameters/Platform"
        - $ref: "#/components/parameters/RepositoryId"
        - $ref: "#/components/parameters/IssueNumberOrKey"
        - name: includeComments
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 수동 재동기화 실행 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRun"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    Platform:
      name: platform
      in: path
      required: true
      schema:
        type: string
        enum:
          - github
          - gitlab
      description: 플랫폼 식별자. 1차 구현은 github를 대상으로 한다.
    SyncRunId:
      name: syncRunId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    FailureId:
      name: failureId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RepositoryId:
      name: repositoryId
      in: path
      required: true
      schema:
        type: string
      description: 로컬 cache 또는 외부 플랫폼 기준 저장소 식별자
    IssueNumberOrKey:
      name: issueNumberOrKey
      in: path
      required: true
      schema:
        type: string
      description: GitHub issue number 또는 플랫폼별 issue key
  responses:
    Unauthorized:
      description: 인증 또는 플랫폼 연결 정보가 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    RateLimitSnapshot:
      type: object
      properties:
        platform:
          type: string
          example: github
        limit:
          type: integer
          example: 5000
        remaining:
          type: integer
          example: 4872
        resetAt:
          type: string
          format: date-time
          nullable: true
        retryAfterSeconds:
          type: integer
          nullable: true
          example: 60
        resource:
          type: string
          nullable: true
          example: core
        capturedAt:
          type: string
          format: date-time
      required:
        - platform
        - limit
        - remaining
        - capturedAt
    SyncRun:
      type: object
      properties:
        syncRunId:
          type: integer
          format: int64
          example: 101
        platform:
          type: string
          example: github
        syncType:
          type: string
          example: MANUAL
        resourceType:
          $ref: "#/components/schemas/SyncResourceType"
        resourceKey:
          type: string
          example: GITHUB:owner/repository
        status:
          $ref: "#/components/schemas/SyncRunStatus"
        triggeredBy:
          type: string
          example: MANUAL
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        createdCount:
          type: integer
          example: 10
        updatedCount:
          type: integer
          example: 5
        skippedCount:
          type: integer
          example: 0
        failedCount:
          type: integer
          example: 1
        failureMessage:
          type: string
          nullable: true
          example: GitHub rate limit exceeded
      required:
        - syncRunId
        - platform
        - resourceType
        - resourceKey
        - status
        - startedAt
    SyncFailure:
      type: object
      properties:
        failureId:
          type: integer
          format: int64
          example: 501
        syncRunId:
          type: integer
          format: int64
          example: 101
        platform:
          type: string
          example: github
        resourceType:
          $ref: "#/components/schemas/SyncResourceType"
        resourceKey:
          type: string
          example: GITHUB:owner/repository
        operation:
          type: string
          example: REFRESH_ISSUES
        errorType:
          $ref: "#/components/schemas/SyncFailureType"
        retryable:
          type: boolean
          example: true
        retryCount:
          type: integer
          example: 0
        nextRetryAt:
          type: string
          format: date-time
          nullable: true
        lastErrorMessage:
          type: string
          example: GitHub rate limit exceeded
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - failureId
        - syncRunId
        - platform
        - resourceType
        - resourceKey
        - operation
        - errorType
        - retryable
        - retryCount
    SyncFailureError:
      type: object
      properties:
        syncRunId:
          type: integer
          format: int64
          nullable: true
        failureId:
          type: integer
          format: int64
          nullable: true
        status:
          type: string
          example: RATE_LIMITED
        message:
          type: string
          example: GitHub rate limit exceeded
        retryable:
          type: boolean
          example: true
        nextRetryAt:
          type: string
          format: date-time
          nullable: true
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Resource not found
    SyncResourceType:
      type: string
      enum:
        - REPOSITORY_LIST
        - REPOSITORY
        - ISSUE
        - COMMENT
    SyncRunStatus:
      type: string
      enum:
        - RUNNING
        - SUCCESS
        - PARTIAL_SUCCESS
        - FAILED
        - RATE_LIMITED
    SyncFailureType:
      type: string
      enum:
        - RATE_LIMITED
        - TEMPORARY_FAILURE
        - AUTHENTICATION_FAILED
        - AUTHORIZATION_FAILED
        - NOT_FOUND
        - VALIDATION_FAILED
        - UNKNOWN
